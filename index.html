<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<script>
/* Simple gate — One Vela */
(function(){
  if (sessionStorage.getItem('ov_auth') === 'ok') return;
  var u = prompt('Username:');
  if (u === null) { window.stop(); document.write('Access denied'); return; }
  var p = prompt('Password:');
  if (u === 'ice' && p === 'Onevela89.') {
    sessionStorage.setItem('ov_auth', 'ok');
  } else {
    window.stop();
    document.write('<h2 style="font-family:sans-serif;text-align:center;padding:40px;color:#0f2742">เข้าใช้งานไม่ได้</h2>');
  }
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f2742">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ต้นทุนบ้าน">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="ระบบติดตามต้นทุนบ้านรายหลัง โครงการวันเวลา One Vela">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>ระบบต้นทุนบ้าน — โครงการวันเวลา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0f2742; --navy2:#1b3a5c; --teal:#0ea5a4; --accent:#f59e0b;
    --bg:#eef2f6; --card:#ffffff; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0;
    --green:#10b981; --red:#ef4444; --yellow:#f59e0b; --blue:#3b82f6;
    --A:#3b82f6; --B:#8b5cf6; --C:#10b981; --D:#f59e0b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sarabun',-apple-system,'Segoe UI',sans-serif;background:var(--bg);
       color:var(--ink);font-size:15px;line-height:1.5;}
  a{color:inherit;}
  .wrap{max-width:1280px;margin:0 auto;padding:0 18px 60px;}

  /* header */
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;
         padding:20px 0;box-shadow:0 2px 14px rgba(15,39,66,.25);}
  header .wrap{padding-bottom:0;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  header h1{font-size:21px;font-weight:800;}
  header .sub{font-size:13px;color:#aac4dd;}
  header .gen{margin-left:auto;font-size:12px;color:#8fb0cf;text-align:right;}

  /* kpi */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:20px;}
  .kpi{background:var(--card);border-radius:12px;padding:15px 16px;
       box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid var(--teal);}
  .kpi .lbl{font-size:12px;color:var(--muted);font-weight:500;}
  .kpi .val{font-size:23px;font-weight:800;margin-top:3px;}
  .kpi .un{font-size:12px;color:var(--muted);font-weight:500;}
  .kpi.k-cost{border-color:var(--accent);}
  .kpi.k-mat{border-color:var(--blue);}
  .kpi.k-lab{border-color:#8b5cf6;}
  .kpi.k-act{border-color:var(--green);}

  .section-title{font-size:15px;font-weight:700;margin:26px 0 12px;
                 display:flex;align-items:center;gap:8px;}
  .section-title::before{content:"";width:4px;height:17px;background:var(--teal);border-radius:2px;}

  /* type cards */
  .types{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .tcard{background:var(--card);border-radius:12px;padding:14px 16px;
         box-shadow:0 1px 3px rgba(0,0,0,.06);border-top:4px solid var(--line);cursor:pointer;
         transition:transform .12s,box-shadow .12s;}
  .tcard:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1);}
  .tcard.tA{border-color:var(--A);} .tcard.tB{border-color:var(--B);}
  .tcard.tC{border-color:var(--C);} .tcard.tD{border-color:var(--D);}
  .tcard .tname{font-weight:700;font-size:14px;}
  .tcard .tcode{font-size:11px;color:var(--muted);}
  .tcard .tbig{font-size:26px;font-weight:800;margin-top:4px;}
  .tcard .tmeta{font-size:12px;color:var(--muted);margin-top:2px;}

  /* filter bar */
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0;}
  .filters select,.filters input{font-family:inherit;font-size:14px;padding:8px 11px;
        border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);}
  .filters input{flex:1;min-width:170px;}
  .filters .cnt{margin-left:auto;font-size:13px;color:var(--muted);font-weight:600;}

  /* house grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:12px;}
  .hcard{background:var(--card);border-radius:11px;padding:13px;cursor:pointer;
         box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--line);
         transition:transform .1s,box-shadow .1s;position:relative;}
  .hcard:hover{transform:translateY(-2px);box-shadow:0 7px 17px rgba(0,0,0,.12);
               border-color:var(--teal);}
  .hcard .htop{display:flex;justify-content:space-between;align-items:flex-start;}
  .hcard .pno{font-size:20px;font-weight:800;line-height:1.1;}
  .hcard .pno small{font-size:11px;color:var(--muted);font-weight:600;}
  .badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;}
  .tg-A{background:#dbeafe;color:#1d4ed8;} .tg-B{background:#ede9fe;color:#6d28d9;}
  .tg-C{background:#d1fae5;color:#047857;} .tg-D{background:#fef3c7;color:#b45309;}
  .hcard .hno{font-size:12px;color:var(--muted);margin-top:5px;}
  .hcard .cost{font-size:17px;font-weight:800;margin-top:7px;}
  .hcard .cost.zero{color:var(--muted);font-size:13px;font-weight:600;}
  .hcard .subc{font-size:11px;color:var(--muted);}
  .pbar{height:6px;background:var(--line);border-radius:4px;margin-top:8px;overflow:hidden;}
  .pbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),#34d399);}
  .hcard .pct{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;
              justify-content:space-between;}
  .cdiff{font-size:12px;font-weight:700;margin-top:6px;padding-top:5px;
         border-top:1px dashed var(--line);}
  .cdiff.pos{color:var(--green);} .cdiff.neg{color:var(--red);}
  .sstat{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;}
  .ss-ว่าง{background:#f1f5f9;color:#64748b;}
  .ss-จอง{background:#fef9c3;color:#a16207;}
  .ss-สัญญา{background:#dbeafe;color:#1d4ed8;}
  .ss-ขายดาวน์{background:#ffedd5;color:#c2410c;}
  .ss-โอนแล้ว{background:#dcfce7;color:#15803d;}

  /* detail */
  .back{display:inline-flex;align-items:center;gap:6px;background:var(--card);
        border:1px solid var(--line);border-radius:8px;padding:8px 14px;cursor:pointer;
        font-family:inherit;font-size:14px;font-weight:600;margin-top:20px;color:var(--navy);}
  .back:hover{background:#f8fafc;border-color:var(--teal);}
  .dhead{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;
         border-radius:14px;padding:20px 24px;margin-top:14px;}
  .dhead .dtitle{font-size:25px;font-weight:800;display:flex;align-items:center;gap:12px;
                 flex-wrap:wrap;}
  .dhead .dmeta{display:flex;gap:22px;flex-wrap:wrap;margin-top:12px;}
  .dhead .dm{font-size:13px;}
  .dhead .dm b{display:block;font-size:15px;color:#fff;font-weight:700;}
  .dhead .dm span{color:#aac4dd;}

  .panel{background:var(--card);border-radius:12px;padding:18px;
         box-shadow:0 1px 3px rgba(0,0,0,.06);margin-top:14px;}
  .panel h3{font-size:15px;font-weight:700;margin-bottom:14px;}
  .charts2{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;margin-top:14px;}

  /* profit */
  .profit{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .pf{background:#f8fafc;border-radius:9px;padding:11px 13px;border:1px solid var(--line);}
  .pf span{font-size:12px;color:var(--muted);display:block;margin-bottom:3px;}
  .pf b{font-size:18px;font-weight:800;}
  .pf.big{background:#f1f5f9;}
  .pf.big b{font-size:21px;}
  .pf.pos b{color:var(--green);} .pf.neg b{color:var(--red);}

  /* phases */
  .phases{display:flex;gap:6px;flex-wrap:wrap;}
  .phase{flex:1;min-width:104px;border:1px solid var(--line);border-radius:9px;
         padding:10px;text-align:center;background:#f8fafc;}
  .phase.on{background:#ecfdf5;border-color:#6ee7b7;}
  .phase .pn{font-size:12.5px;font-weight:700;}
  .phase .pa{font-size:13px;font-weight:800;margin-top:3px;}
  .phase .ps{font-size:10.5px;font-weight:700;margin-top:3px;}
  .phase.on .ps{color:var(--green);}
  .phase.off .ps{color:var(--muted);}
  .phase .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:3px;}
  .phase.on .dot{background:var(--green);}
  .phase.off .dot{background:#cbd5e1;}

  /* donut */
  .donut-wrap{display:flex;align-items:center;gap:16px;}
  .donut-legend{font-size:13px;}
  .donut-legend div{display:flex;align-items:center;gap:7px;margin:5px 0;}
  .donut-legend i{width:12px;height:12px;border-radius:3px;display:inline-block;}
  .donut-legend b{margin-left:auto;font-weight:700;}

  /* category bars */
  .catbar{margin:9px 0;}
  .catbar .cl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px;}
  .catbar .cl b{font-weight:700;}
  .catbar .ct{height:13px;background:var(--line);border-radius:5px;overflow:hidden;}
  .catbar .ct > i{display:block;height:100%;border-radius:5px;}

  /* table */
  .tablebox{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);}
  th{background:#f8fafc;font-weight:700;color:var(--muted);font-size:12px;
     position:sticky;top:0;cursor:pointer;white-space:nowrap;}
  th:hover{color:var(--navy);}
  td.num,th.num{text-align:right;}
  tr:hover td{background:#f8fafc;}
  .cat-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
  .lab-row td{background:#fff7ed;}

  .alert{border-radius:10px;padding:12px 15px;font-size:13.5px;margin-top:12px;}
  .alert.ok{background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;}
  .alert.warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;}

  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty .big{font-size:42px;margin-bottom:8px;}

  .hide{display:none!important;}
  /* ===== TABLET (≤880px) ===== */
  @media(max-width:880px){
    .kpis{grid-template-columns:repeat(2,1fr);}
    .types{grid-template-columns:repeat(2,1fr);}
    .profit{grid-template-columns:repeat(2,1fr);}
    .charts2{grid-template-columns:1fr;}
    .wrap{padding:0 14px 50px;}
    header{padding:16px 0;}
    header h1{font-size:19px;}
    header .gen{margin-left:0;margin-top:6px;text-align:left;width:100%;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
    .dhead{padding:16px 18px;}
    .dhead .dtitle{font-size:21px;}
    .dhead .dmeta{gap:14px;}
    .phase{min-width:90px;flex:1 1 calc(50% - 6px);}
  }

  /* ===== MOBILE (≤600px) ===== */
  @media(max-width:600px){
    body{font-size:14px;}
    .wrap{padding:0 12px 40px;}
    header{padding:14px 0;}
    header .wrap{flex-direction:column;align-items:flex-start;gap:4px;}
    header h1{font-size:17px;}
    header .sub{font-size:12px;}
    header .gen{font-size:11px;}

    /* KPI: 1 col on phone */
    .kpis{grid-template-columns:1fr;gap:8px;margin-top:14px;}
    .kpi{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;}
    .kpi .lbl{font-size:12px;flex:1;}
    .kpi .val{font-size:19px;margin-top:0;}
    .kpi .un{display:none;}

    /* Type cards: 2 col compact */
    .types{grid-template-columns:repeat(2,1fr);gap:8px;}
    .tcard{padding:11px 12px;}
    .tcard .tname{font-size:13px;}
    .tcard .tbig{font-size:22px;}
    .tcard .tmeta{font-size:11px;}

    /* Filters stack vertically */
    .filters{flex-direction:column;align-items:stretch;gap:8px;}
    .filters select,.filters input{font-size:15px;padding:10px 12px;width:100%;}
    .filters .cnt{margin-left:0;text-align:right;}

    /* House grid: 2 columns on phone */
    .grid{grid-template-columns:repeat(2,1fr);gap:8px;}
    .hcard{padding:11px;border-radius:10px;}
    .hcard .pno{font-size:17px;}
    .hcard .cost{font-size:15px;}

    /* Section titles */
    .section-title{font-size:14px;margin:20px 0 10px;}

    /* Detail header */
    .dhead{padding:14px 16px;border-radius:12px;margin-top:10px;}
    .dhead .dtitle{font-size:18px;gap:8px;}
    .dhead .dmeta{gap:10px 16px;margin-top:10px;}
    .dhead .dm{font-size:12px;}
    .dhead .dm b{font-size:13px;}

    /* Panels */
    .panel{padding:14px;border-radius:10px;}
    .panel h3{font-size:14px;margin-bottom:10px;}

    /* Profit: 2 col on mobile */
    .profit{grid-template-columns:repeat(2,1fr);gap:8px;}
    .pf{padding:10px 11px;}
    .pf span{font-size:11px;}
    .pf b{font-size:15px;}
    .pf.big b{font-size:17px;}

    /* Phases: 2 cols */
    .phases{gap:5px;}
    .phase{flex:1 1 calc(50% - 5px);min-width:0;padding:8px;}
    .phase .pn{font-size:12px;}
    .phase .pa{font-size:12px;}
    .phase .ps{font-size:10px;}

    /* Charts stacked */
    .charts2{gap:10px;}
    .donut-wrap{flex-direction:column;align-items:center;text-align:center;}
    .donut-legend{width:100%;}

    /* Table: smaller font, sticky first column */
    .tablebox{margin:0 -14px;}
    table{font-size:12px;}
    th,td{padding:7px 8px;}
    th{font-size:11px;}
    .cat-pill{font-size:10px;padding:2px 6px;}

    /* Back button bigger tap area */
    .back{padding:10px 16px;font-size:15px;width:100%;justify-content:center;}

    /* Alerts */
    .alert{font-size:13px;padding:11px 13px;}
  }

  /* ===== TINY MOBILE (≤380px) ===== */
  @media(max-width:380px){
    .grid{grid-template-columns:1fr;}
    .types{grid-template-columns:1fr;}
  }

  /* ===== iOS Safari safe-area + tap improvements ===== */
  @supports(padding:max(0px)){
    header{padding-top:max(20px,env(safe-area-inset-top));}
    .wrap{padding-left:max(18px,env(safe-area-inset-left));
          padding-right:max(18px,env(safe-area-inset-right));}
  }
  button,select,input{-webkit-tap-highlight-color:transparent;}
  .hcard,.tcard,.back{-webkit-tap-highlight-color:rgba(14,165,164,.15);}
  /* Smooth scrolling, no zoom on input focus */
  html{-webkit-text-size-adjust:100%;}
  input,select{font-size:16px;} /* prevent iOS zoom on focus */


  /* ============ PHASE 3 — Sales Panel ============ */
  .vmode-toggle{position:fixed;bottom:14px;right:14px;z-index:100;
    background:var(--card);border:1px solid var(--line);border-radius:24px;
    padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;
    box-shadow:0 3px 12px rgba(0,0,0,.18);display:flex;gap:6px;align-items:center;}
  .vmode-toggle:hover{border-color:var(--teal);}
  .vmode-toggle i{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;}
  body.view-customer .vmode-toggle i{background:var(--blue);}
  body.view-customer .salesOnly,
  body.view-customer .adminOnly{display:none!important;}

  /* Sales panel */
  .sales-panel{background:linear-gradient(135deg,#7c2d12,#9a3412);color:#fff;
    border-radius:14px;padding:18px 22px;margin-top:14px;}
  .sales-panel h3{font-size:16px;font-weight:800;margin-bottom:12px;color:#fde68a;
    display:flex;align-items:center;gap:8px;}
  .sales-panel h3::before{content:"👤";}
  .sales-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
  .sgi{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 13px;}
  .sgi .lbl{font-size:11px;color:#fed7aa;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .sgi .val{font-size:15px;font-weight:700;margin-top:2px;word-break:break-word;}
  .sgi .val a{color:#fde68a;text-decoration:underline;}
  .sgi.empty .val{color:#fdba74;font-weight:400;font-style:italic;}

  /* Sales funnel timeline */
  .funnel{background:var(--card);border-radius:12px;padding:18px;margin-top:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .funnel h3{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .funnel h3::before{content:"📅";}
  .funnel-steps{display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap;}
  .fstep{flex:1;min-width:130px;text-align:center;position:relative;}
  .fstep .dot{width:34px;height:34px;border-radius:50%;background:#e2e8f0;
    margin:0 auto 6px;display:flex;align-items:center;justify-content:center;
    font-size:16px;color:#94a3b8;font-weight:800;}
  .fstep.done .dot{background:var(--green);color:#fff;}
  .fstep.current .dot{background:var(--accent);color:#fff;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4);}
                   50%{box-shadow:0 0 0 8px rgba(245,158,11,0);}}
  .fstep .fname{font-size:12px;font-weight:700;color:var(--ink);}
  .fstep .fdate{font-size:11px;color:var(--muted);margin-top:2px;}

  /* Promotions */
  .promo-panel{background:linear-gradient(135deg,#047857,#065f46);color:#fff;
    border-radius:12px;padding:16px 20px;margin-top:14px;}
  .promo-panel h3{font-size:15px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .promo-panel h3::before{content:"🎁";}
  .promo-list{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
  .promo-chip{background:rgba(255,255,255,.18);padding:5px 12px;border-radius:20px;
    font-size:12px;font-weight:600;}
  .promo-summary{display:flex;justify-content:space-between;align-items:center;
    margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.2);font-size:13px;}
  .promo-summary b{font-size:18px;}

  /* Photo gallery */
  .photo-panel{background:var(--card);border-radius:12px;padding:18px;margin-top:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .photo-panel h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .photo-panel h3::before{content:"📸";}
  .photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(min-width:880px){.photo-grid{grid-template-columns:repeat(4,1fr);}}
  .pcell{background:#f1f5f9;border-radius:8px;overflow:hidden;aspect-ratio:4/3;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .15s;}
  .pcell:hover{transform:scale(1.02);}
  .pcell img{width:100%;height:100%;object-fit:cover;display:block;}
  .pcaption{font-size:11px;text-align:center;color:var(--muted);margin-top:4px;}
  .photo-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .photo-actions a{flex:1;min-width:120px;text-align:center;padding:10px 12px;
    border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;
    background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
  .photo-actions a:hover{background:#dbeafe;}

  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;
    display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:95%;max-height:95vh;border-radius:8px;}
  .lightbox-close{position:absolute;top:14px;right:18px;color:#fff;font-size:30px;
    cursor:pointer;background:none;border:none;}

  /* Share customer link button */
  .share-link{display:inline-flex;align-items:center;gap:6px;background:#10b981;color:#fff;

    <!-- ═══════════ รายงานการนำสินค้า/วัสดุเข้า (Material Intake Report) ═══════════ -->
    <style>

    <script>
    (function(){
      var $=function(id){return document.getElementById(id);};
      var fmt=function(n){return Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:2});};
      var fmt0=function(n){return Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});};
      var ALL=[], DATE_TEXT={};

      function flat(){
        var out=[];
        ((typeof PROJECT_DATA!=='undefined'&&PROJECT_DATA.houses)||[]).forEach(function(h){
          (h.items||[]).forEach(function(it){
            var d=it.date||'';
            if(d && it.dateText) DATE_TEXT[d]=it.dateText;
            out.push({date:d,dateText:it.dateText||d||'-',
              plot:h.plot,houseNo:h.houseNo||'',typeCode:h.typeCode||'',
              name:it.name||'-',qty:(it.qty==null?'':it.qty),
              total:Number(it.total)||0,category:it.category||'-',
              isLabor:!!it.isLabor});
          });
        });
        return out;
      }
      function thDate(iso){ return DATE_TEXT[iso]||iso||'-'; }
      function stat(n,l){ return '<div class="ik-stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
      function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

      function applyFilters(){
        var from=$('ikFrom').value, to=$('ikTo').value;
        var plot=($('ikPlot').value||'').trim();
        var cat=$('ikCat').value, type=$('ikType').value;
        var q=($('ikSearch').value||'').trim().toLowerCase();
        return ALL.filter(function(r){
          if(from && r.date && r.date<from) return false;
          if(to && r.date && r.date>to) return false;
          if(plot && String(r.plot)!==plot) return false;
          if(cat && r.category!==cat) return false;
          if(type==='material' && r.isLabor) return false;
          if(type==='labor' && !r.isLabor) return false;
          if(q && r.name.toLowerCase().indexOf(q)<0) return false;
          return true;
        });
      }

      function rowCells(r){
        return '<td><b>'+esc(r.plot)+'</b> <span style="color:var(--muted)">'+esc(r.houseNo)+'</span></td>'+
          '<td>'+esc(r.name)+'</td>'+
          '<td><span class="ik-tag'+(r.isLabor?' labor':'')+'">'+esc(r.category)+'</span></td>'+
          '<td class="r">'+(r.qty===''?'-':fmt(r.qty))+'</td>'+
          '<td class="r">'+fmt(r.total)+'</td>';
      }

      function renderByDay(rows){
        var groups={};
        rows.forEach(function(r){ (groups[r.date]=groups[r.date]||[]).push(r); });
        var keys=Object.keys(groups).sort().reverse();
        $('ikBody').innerHTML=keys.map(function(d,i){
          var g=groups[d];
          var sum=g.reduce(function(s,r){return s+r.total;},0);
          var open=(i<3)?' open':''; // กาง 3 วันล่าสุด
          return '<div class="ik-day'+open+'">'+
            '<div class="ik-dayhd" onclick="this.parentNode.classList.toggle(\'open\')">'+
              '<span class="dt">📅 '+esc(thDate(d))+'</span>'+
              '<span class="meta">'+g.length+' รายการ · <b>฿'+fmt(sum)+'</b></span>'+
              '<span class="cv">▼</span>'+
            '</div>'+
            '<div class="ik-tablewrap"><table class="ik-table"><thead><tr>'+
              '<th>แปลง</th><th>ชื่อสินค้า / รายการ</th><th>หมวด</th>'+
              '<th class="r">จำนวน</th><th class="r">มูลค่า (บาท)</th>'+
            '</tr></thead><tbody>'+
              g.map(function(r){return '<tr>'+rowCells(r)+'</tr>';}).join('')+
            '</tbody></table></div>'+
          '</div>';
        }).join('');
      }

      function renderFlat(rows){
        var s=rows.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
        $('ikBody').innerHTML='<div class="ik-day open"><div class="ik-tablewrap" style="display:block">'+
          '<table class="ik-table"><thead><tr>'+
          '<th>วันที่</th><th>แปลง</th><th>ชื่อสินค้า / รายการ</th><th>หมวด</th>'+
          '<th class="r">จำนวน</th><th class="r">มูลค่า (บาท)</th>'+
          '</tr></thead><tbody>'+
          s.map(function(r){return '<tr><td>'+esc(thDate(r.date))+'</td>'+rowCells(r)+'</tr>';}).join('')+
          '</tbody></table></div></div>';
      }

      function render(){
        var rows=applyFilters();
        var total=rows.reduce(function(s,r){return s+r.total;},0);
        var dmap={}; rows.forEach(function(r){ if(r.date)dmap[r.date]=1; });
        var dks=Object.keys(dmap).sort();
        $('ikSummary').innerHTML=
          stat(fmt0(rows.length),'รายการ')+
          stat('฿'+fmt(total),'มูลค่ารวม')+
          stat(fmt0(dks.length),'จำนวนวันที่นำเข้า')+
          stat(dks.length?(thDate(dks[dks.length-1])+'  ↤  '+thDate(dks[0])):'-','ช่วงวันที่ล่าสุด ↤ เก่าสุด');
        if(!rows.length){ $('ikBody').innerHTML='<div class="ik-empty">ไม่พบรายการตามเงื่อนไขที่เลือก</div>'; return; }
        if($('ikView').value==='flat') renderFlat(rows); else renderByDay(rows);
      }

      function exportCSV(){
        var rows=applyFilters().slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
        if(!rows.length){ alert('ไม่มีรายการให้ export'); return; }
        var head=['วันที่','แปลง','บ้านเลขที่','ไทป์','ชื่อสินค้า/รายการ','หมวด','จำนวน','มูลค่า(บาท)','ประเภท'];
        var lines=rows.map(function(r){
          return [thDate(r.date),r.plot,r.houseNo,r.typeCode,r.name,r.category,
            (r.qty===''?'':r.qty),r.total,(r.isLabor?'ค่าแรง':'วัสดุ')];
        });
        var csv='﻿'+[head].concat(lines).map(function(row){
          return row.map(function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"';}).join(',');
        }).join('\r\n');
        var a=document.createElement('a');
        a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
        a.download='รายงานนำสินค้าเข้า_'+new Date().toISOString().slice(0,10)+'.csv';
        a.click();
      }

      function build(){
        if(typeof PROJECT_DATA==='undefined'||!PROJECT_DATA.houses){ setTimeout(build,250); return; }
        ALL=flat();
        // เติม dropdown หมวด
        var cats=(PROJECT_DATA.categoryOrder||[]).slice();
        ALL.forEach(function(r){ if(cats.indexOf(r.category)<0) cats.push(r.category); });
        $('ikCat').innerHTML='<option value="">ทุกหมวด</option>'+
          cats.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join('');
        // head hint
        var grand=ALL.reduce(function(s,r){return s+r.total;},0);
        $('ikHeadHint').textContent=' — '+fmt0(ALL.length)+' รายการ · ฿'+fmt0(grand);
        // events
        ['ikFrom','ikTo','ikPlot','ikCat','ikType','ikSearch','ikView'].forEach(function(id){
          $(id).addEventListener('input',render);
          $(id).addEventListener('change',render);
        });
        $('ikReset').addEventListener('click',function(){
          ['ikFrom','ikTo','ikPlot','ikSearch'].forEach(function(id){$(id).value='';});
          $('ikCat').value=''; $('ikType').value=''; $('ikView').value='day'; render();
        });
        $('ikExport').addEventListener('click',exportCSV);
        $('ikToggle').addEventListener('click',function(){
          $('ikSec').classList.toggle('open');
        });
        render();
      }
      if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',build);
      else build();
    })();
    </script>
    <!-- ═══════════ จบ รายงานการนำสินค้า/วัสดุเข้า ═══════════ -->

    <div class="section-title">รายการบ้าน — คลิกที่แปลงเพื่อดูรายละเอียด</div>

        <option value="A">A ULTRA — บ้านเดี่ยว 2 ชั้น</option>
        <option value="B">B MINUTES — บ้านเดี่ยวชั้นเดียว</option>
        <option value="C">C SECOND — บ้านแฝดชั้นเดียว</option>

const PHOTO_VIEWS = [
  {key:'exterior',  label:'หน้าบ้าน'},
  {key:'floorplan', label:'ผังบ้าน'},
  {key:'interior',  label:'ภายในบ้าน'},
  {key:'siteplan',  label:'ผังโครงการ'},
];

function photoSrc(typeKey, viewKey){
  // try .jpg first, fallback to .svg via onerror
  return `assets/photos/${typeKey}_${viewKey}.jpg`;
}

function fmtMoney(n){ return n ? '฿' + Math.round(n).toLocaleString('th-TH') : '—'; }
function emptyOrText(v){ return v ? v : '<span style="opacity:.6">—</span>'; }

function renderPhotos(h){
  if(!h.typeKey) return '';
  const grid = PHOTO_VIEWS.map(v => {
    const jpg = photoSrc(h.typeKey, v.key);
    const svg = `assets/photos/${h.typeKey}_${v.key}.svg`;
    return `<div>
      <div class="pcell" onclick="openLightbox('${jpg}','${svg}')">
        <img src="${jpg}" onerror="this.onerror=null;this.src='${svg}'" alt="${v.label}">
      </div>
      <div class="pcaption">${v.label}</div>
    </div>`;
  }).join('');

  const mapsLink = h.mapsUrl ? `<a href="${h.mapsUrl}" target="_blank">🗺 ดูบนแผนที่</a>` : '';
  const tourLink = h.virtualTour ? `<a href="${h.virtualTour}" target="_blank">🎥 VDO/360°</a>` : '';
  const customerShare = `<a href="#" onclick="shareCustomerLink(${h.plot});return false;" class="salesOnly">🔗 ส่งให้ลูกค้า</a>`;

  return `<div class="panel photo-panel">
    <h3>รูปบ้าน — ${h.typeShort || ''}</h3>
    <div class="photo-grid">${grid}</div>
    ${(mapsLink || tourLink || true) ? `<div class="photo-actions">${mapsLink}${tourLink}${customerShare}</div>` : ''}
  </div>`;
}

    ['อาชีพ / บริษัท', [h.cJob, h.cCompany].filter(Boolean).join(' · ')],
    ['รายได้/เดือน', h.cIncome ? fmtMoney(h.cIncome) : ''],
    ['คู่สมรส', h.cSpouse],
    ['วันเกิด', h.cBirthday],
    ['ที่อยู่ปัจจุบัน', h.cAddress],
    ['Agent', h.agent],
    ['ที่มา Lead', h.leadSource],
    ['ติดต่อล่าสุด', h.lastContact],
  ];
  const hasData = fields.some(f => f[1]);
  if (!hasData && h.status === 'ว่าง') return '';

  const grid = fields.map(([lbl, v]) =>
    `<div class="sgi ${v ? '' : 'empty'}"><div class="lbl">${lbl}</div>
      <div class="val">${v || 'ยังไม่ระบุ'}</div></div>`
  ).join('');

  const followNote = h.followNote ? `<div class="sgi" style="grid-column:1/-1">
    <div class="lbl">บันทึก Follow-up</div>
    <div class="val">${h.followNote}</div></div>` : '';

  return `<div class="sales-panel salesOnly">
    <h3>ข้อมูลลูกค้า (เฉพาะทีม Sales)</h3>
    <div class="sales-grid">${grid}${followNote}</div>
  </div>`;
}

function renderFunnel(h){
  const steps = [
    {key:'จอง',         icon:'1', date:h.dateBook,     done:!!h.dateBook},
    {key:'สัญญา',       icon:'2', date:h.dateContract, done:!!h.dateContract},
    {key:'ผ่อนดาวน์',   icon:'3', date:h.dateDownEnd,  done:!!h.dateDownEnd},
    {key:'ยื่นกู้',      icon:'4', date:h.loanBank,     done:!!h.loanBank},
    {key:'อนุมัติกู้',   icon:'5', date:h.loanStatus === 'อนุมัติแล้ว' ? '✓' : '',
     done:h.loanStatus === 'อนุมัติแล้ว'},
    {key:'โอน',         icon:'6', date:h.dateTransfer, done:h.status === 'โอนแล้ว'},
  ];
  // Detect current step
  const lastDoneIdx = steps.map(s => s.done).lastIndexOf(true);
  const currentIdx = lastDoneIdx + 1;
  if(currentIdx < steps.length) steps[currentIdx].current = true;

  const hasAny = steps.some(s => s.done);
  if (!hasAny) return '';

  return `<div class="funnel salesOnly">
    <h3>Sales Funnel</h3>
    <div class="funnel-steps">${steps.map(s => `
      <div class="fstep ${s.done?'done':''} ${s.current?'current':''}">
        <div class="dot">${s.done?'✓':s.icon}</div>
        <div class="fname">${s.key}</div>
        <div class="fdate">${s.date || (s.done?'เสร็จ':'รอ')}</div>
      </div>`).join('')}</div>
    ${h.loanBank ? `<div style="margin-top:12px;font-size:13px;color:var(--muted)">
      ธนาคาร: <b>${h.loanBank}</b> · สถานะ: <b>${h.loanStatus||'—'}</b>
      ${h.loanAmount?`· วงเงิน <b>${fmtMoney(h.loanAmount)}</b>`:''}
    </div>` : ''}
  </div>`;
}

function renderPromos(h){

}

function fmtThaiDate(iso){
  if(!iso) return '—';
  // YYYY-MM-DD → DD/MM/YY (Thai year)
  const m = String(iso).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return iso;
  const y = parseInt(m[1]) + 543;
  return `${parseInt(m[3])}/${parseInt(m[2])}/${y % 100}`;
}

function renderInstallments(h){
  const arr = h.installments || [];
  if(!arr.length) return '';

  // Compute totals
  let totalDue = 0, totalPaid = 0, overdue = [], downDue = 0, downPaid = 0;
  for(const i of arr){
    const due = Number(i.dueAmount) || 0;
    const paid = Number(i.paidAmount) || 0;
    totalDue += due;
    totalPaid += paid;
    if(i.type === 'ดาวน์'){
      downDue += due;
      downPaid += paid;
    }
    if(i._autoOverdue || i.status === 'เลยกำหนด') overdue.push(i);
  }
  const pct = totalDue > 0 ? Math.round((totalPaid / totalDue) * 100) : 0;
  const downPct = downDue > 0 ? Math.round((downPaid / downDue) * 100) : 0;

  const overdueAmt = overdue.reduce((s,i) => s + (Number(i.dueAmount) || 0), 0);
  const overdueBlock = overdue.length ? `<div class="overdue-alert">
    🔴 <b>เลยกำหนด ${overdue.length} งวด</b> · ค่างวดค้าง <b>${fmtMoney(overdueAmt)}</b>
  </div>` : '';

  const today = new Date().toISOString().slice(0,10);
  const rows = arr.map(i => {
    const due = Number(i.dueAmount) || 0;
    const paid = Number(i.paidAmount) || 0;
    let statusClass = 'is-pending';
    let statusText = i.status || 'รอจ่าย';
    if(i._autoOverdue || i.status === 'เลยกำหนด'){
      statusClass = 'is-overdue';
      statusText = 'เลยกำหนด';
    } else if(i.status === 'จ่ายแล้ว'){
      statusClass = 'is-paid';
    } else if(i.status === 'จ่ายบางส่วน'){
      statusClass = 'is-partial';
    } else if(i.status === 'ยกเลิก'){
      statusClass = 'is-cancel';
    }
    return `<tr>
      <td>${i.seq || ''}</td>
      <td>${i.label || ''}</td>
      <td><span class="ist-type t-${i.type || 'อื่นๆ'}">${i.type || ''}</span></td>
      <td>${fmtThaiDate(i.dueDate)}</td>
      <td class="ist-num">${due ? fmtMoney(due) : '—'}</td>
      <td>${fmtThaiDate(i.paidDate)}</td>
      <td class="ist-num">${paid ? fmtMoney(paid) : '—'}</td>
      <td><span class="ist-status ${statusClass}">${statusText}</span></td>
      <td style="font-size:11px;color:var(--muted)">${i.note || ''}</td>
    </tr>`;
  }).join('');

  return `<div class="inst-panel salesOnly">
    <h3>ตารางผ่อนดาวน์</h3>
    ${overdueBlock}
    <div class="inst-progress">
      <div class="ipbar"><i style="width:${Math.min(pct,100)}%"></i></div>
      <div class="iptxt">
        <span>จ่ายไปแล้ว <b>${fmtMoney(totalPaid)}</b> จาก <b>${fmtMoney(totalDue)}</b></span>
        <span><b>${pct}%</b> ของยอดรวม</span>
      </div>
    </div>
    <div class="inst-summary">
      <div class="is"><div class="lbl">งวดทั้งหมด</div><div class="val">${arr.length}</div></div>
      <div class="is pos"><div class="lbl">จ่ายแล้ว</div><div class="val">${arr.filter(i => i.status==='จ่ายแล้ว').length}</div></div>
      <div class="is"><div class="lbl">รอจ่าย</div><div class="val">${arr.filter(i => i.status==='รอจ่าย' && !i._autoOverdue).length}</div></div>
      ${overdue.length ? `<div class="is neg"><div class="lbl">เลยกำหนด</div><div class="val">${overdue.length}</div></div>` : ''}
      ${downDue > 0 ? `<div class="is"><div class="lbl">ผ่อนดาวน์</div><div class="val">${downPct}%</div></div>` : ''}
    </div>
    <div class="inst-tablebox"><table class="inst-table">
      <thead><tr>
        <th>ลำดับ</th><th>ชื่องวด</th><th>ประเภท</th>
        <th>วันกำหนด</th><th class="ist-num">ต้องจ่าย</th>
        <th>วันจ่ายจริง</th><th class="ist-num">จ่ายจริง</th>
        <th>สถานะ</th><th>หมายเหตุ</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

/* ============ Inject sales panels via MutationObserver ============
   Why: the original openDetail isn't on window, so we can't wrap it.
   Instead, we watch for #detailView becoming visible + #detailBody changing
   and inject our panels after the .dhead header. */
let _lastInjectedPlot = null;
function injectSalesSections(){
  try {
    const dhead = document.querySelector('#detailBody .dhead');
    if(!dhead){ return; }
    // Extract plot number from dhead text
    const m = dhead.textContent.match(/แปลง\s+(\d+)/);
    if(!m){ return; }
    const plot = parseInt(m[1]);

    // Skip if our wrapper already exists AND it's for the same plot
    const existingWrap = document.querySelector('.sales-extras-wrapper');
    if(existingWrap && _lastInjectedPlot === plot){
      return; // already injected for this plot — break infinite loop
    }

    const houses = window.HOUSES || (typeof HOUSES !== 'undefined' ? HOUSES : null);
    if(!houses){ console.warn('[SalesPanel] HOUSES not accessible'); return; }
    const h = houses.find(x => x.plot === plot);
    if(!h){ console.warn('[SalesPanel] Plot', plot, 'not found'); return; }

    // Remove previous injection (if any)
    if(existingWrap) existingWrap.remove();

    // Build extras
    const extras = renderPhotos(h) + renderPromos(h) + renderCustomer(h) + renderFunnel(h) + renderInstallments(h);
    if(!extras){ console.log('[SalesPanel] No extras to inject for plot', plot); _lastInjectedPlot = plot; return; }
    console.log('[SalesPanel] Injecting plot', plot, '— bytes:', extras.length);
    _lastInjectedPlot = plot;

  // Wrap and insert after dhead
  const wrap = document.createElement('div');
  wrap.className = 'sales-extras-wrapper';
  wrap.innerHTML = extras;
  dhead.parentNode.insertBefore(wrap, dhead.nextSibling);

    // Customer view: hide cost-related panels (mark non-sales/non-photo/non-promo as adminOnly)
    if(document.body.classList.contains('view-customer')){
      const detailBody = document.getElementById('detailBody');
      detailBody.querySelectorAll('.panel, .alert, .kpis').forEach(el => {
        if(wrap.contains(el)) return; // skip our injected panels
        if(!el.classList.contains('salesOnly')) el.classList.add('adminOnly');
      });
    }
  } catch(err) {
    console.error('[SalesPanel] injectSalesSections error:', err);
  }
}

function setupSalesHook(){
  const detailBody = document.getElementById('detailBody');
  const detailView = document.getElementById('detailView');
  if(!detailBody || !detailView){
    console.warn('[SalesPanel] detailBody/View missing — retry in 500ms');
    setTimeout(setupSalesHook, 500);
    return;
  }
  console.log('[SalesPanel] Hook initialized');

  // Approach 1: Event delegation on document — most reliable
  document.addEventListener('click', (e) => {
    const hcard = e.target.closest('.hcard');
    if(!hcard) return;
    console.log('[SalesPanel] hcard clicked plot=', hcard.dataset.plot);
    // Wait a few ms for original openDetail to render
    setTimeout(injectSalesSections, 50);
    setTimeout(injectSalesSections, 200);  // retry in case slow
  });

  // Approach 2: MutationObserver on detailBody (backup)
  const bodyObserver = new MutationObserver(() => {
    if(detailView.classList.contains('hide')) return;
    setTimeout(injectSalesSections, 0);
  });
  bodyObserver.observe(detailBody, {childList: true, subtree: false});

  // Approach 3: ViewObserver on detailView class (URL-based deep linking)
  const viewObserver = new MutationObserver(() => {
    if(!detailView.classList.contains('hide')){
      setTimeout(injectSalesSections, 0);
    }
  });
  viewObserver.observe(detailView, {attributes: true, attributeFilter: ['class']});
}
// Run setup even if load already fired
if(document.readyState === 'complete'){
  setupSalesHook();
} else {
  window.addEventListener('load', setupSalesHook);
}

/* ---------- donut (SVG) ---------- */
function donut(parts){
  const tot = parts.reduce((s,p)=>s+p.v,0)||1;
  let acc=0, R=52, C=2*Math.PI*R, segs='';
  parts.forEach(p=>{
    const len=p.v/tot*C;
    segs+=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${p.c}"
      stroke-width="22" stroke-dasharray="${len} ${C-len}"
      stroke-dashoffset="${-acc}" transform="rotate(-90 70 70)"></circle>`;
    acc+=len;
  });
  return `<svg width="140" height="140" viewBox="0 0 140 140">${segs}
    <circle r="40" cx="70" cy="70" fill="#fff"></circle></svg>`;
}

/* ---------- line chart (SVG) ---------- */
function lineChart(timeline){
  if(!timeline.length) return '<div style="color:var(--muted)">ไม่มีข้อมูล</div>';
  const W=620,H=190,pl=58,pr=18,pt=16,pb=34;
  const max=Math.max(...timeline.map(t=>t.cumulative))*1.12||1;
  const n=timeline.length;
  const x=i=> n<2 ? pl+(W-pl-pr)/2 : pl+i*(W-pl-pr)/(n-1);
  const y=v=> pt+(1-v/max)*(H-pt-pb);
  let pts=timeline.map((t,i)=>`${x(i)},${y(t.cumulative)}`).join(' ');
  let area=`${pl},${H-pb} ${pts} ${x(n-1)},${H-pb}`;
  let dots=timeline.map((t,i)=>`<circle cx="${x(i)}" cy="${y(t.cumulative)}" r="4"
      fill="#0ea5a4" stroke="#fff" stroke-width="2"></circle>
      <text x="${x(i)}" y="${y(t.cumulative)-10}" font-size="10" fill="#0f2742"
      text-anchor="middle" font-weight="700">${fmt(t.cumulative)}</text>`).join('');
  let xlbl=timeline.map((t,i)=>`<text x="${x(i)}" y="${H-12}" font-size="10.5"
      fill="#64748b" text-anchor="middle">${t.dateText}</text>`).join('');
  let grid='';
  for(let g=0;g<=4;g++){
    const gv=max*g/4, gy=y(gv);
    grid+=`<line x1="${pl}" y1="${gy}" x2="${W-pr}" y2="${gy}" stroke="#e2e8f0"></line>
      <text x="${pl-6}" y="${gy+3}" font-size="9.5" fill="#94a3b8"
      text-anchor="end">${fmt(gv)}</text>`;
  }
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="max-width:100%">
    ${grid}
    <polygon points="${area}" fill="rgba(14,165,164,.13)"></polygon>
    <polyline points="${pts}" fill="none" stroke="#0ea5a4" stroke-width="2.5"></polyline>
    ${dots}${xlbl}</svg>`;
}

    <div class="kpi"><div class="lbl">ความคืบหน้าเฟส</div>
      <div class="val">${h.phaseProgress}%</div>
      <div class="un">${h.phases.filter(p=>p.started).length}/${h.phases.length} เฟส</div></div>
  </div>`;

  /* กำไร-ขาดทุน */
  const price = h.priceNet || 0;
  const diff = price - h.totalCost;
  const margin = price ? diff / price * 100 : 0;
  const dC = diff >= 0 ? 'pos' : 'neg';
  const profitPanel = `<div class="panel">
    <h3>กำไร–ขาดทุน (ประเมินจากต้นทุนที่ลงถึงปัจจุบัน)</h3>
    <div class="profit">
      <div class="pf"><span>ราคาขายสุทธิ</span><b>฿${fmt(price)}</b></div>
      <div class="pf"><span>ต้นทุนที่ลงแล้ว</span><b>฿${fmt(h.totalCost)}</b></div>
      <div class="pf big ${dC}"><span>ส่วนต่าง (ขาย − ทุน)</span><b>฿${fmt(diff)}</b></div>
      <div class="pf big ${dC}"><span>อัตรากำไรขั้นต้น</span><b>${margin.toFixed(1)}%</b></div>
    </div>
    <div class="alert warn">⚠️ ต้นทุนยังลงไม่ครบ (บ้านอยู่ระหว่างก่อสร้าง) — ส่วนต่างจริงจะลดลงเมื่อมีการเบิกวัสดุ/ค่าแรงเพิ่ม ตัวเลขนี้เป็นการประเมิน ณ ปัจจุบันเท่านั้น</div>
  </div>`;

  /* phases */
  const phaseHtml = `<div class="panel"><h3>ความคืบหน้างานก่อสร้าง (ประเมินจากหมวดวัสดุที่เบิก)</h3>
    <div class="phases">` + h.phases.map(p=>`
      <div class="phase ${p.started?'on':'off'}">
        <div class="pn">${p.name}</div>
        <div class="pa">${p.started?'฿'+fmt(p.amount):'—'}</div>
        <div class="ps"><span class="dot"></span>${p.started?'เบิกแล้ว':'ยังไม่เบิก'}</div>
      </div>`).join('') + `</div>`;
  const notStarted = h.phases.filter(p=>!p.started);
  const orderAlert = notStarted.length
    ? `<div class="alert warn">⚠️ <b>หมวดที่ยังไม่ได้เบิกวัสดุ:</b> `+
      notStarted.map(p=>p.name).join(', ')+` — ควรวางแผนสั่งวัสดุกลุ่มนี้</div>`
    : `<div class="alert ok">✅ เบิกวัสดุครบทุกหมวดงานหลักแล้ว</div>`;
  const phasePanel = phaseHtml + orderAlert + `</div>`;

  /* donut + category bars */
  const dParts=[
    {n:'ค่าวัสดุ',v:h.materialCost,c:'#3b82f6'},
    {n:'ค่าแรง (LB)',v:h.laborCost,c:'#f97316'}
  ];
  const donutHtml = `<div class="panel"><h3>วัสดุ vs ค่าแรง</h3>
    <div class="donut-wrap">${donut(dParts)}
    <div class="donut-legend">`+dParts.map(p=>`<div><i style="background:${p.c}"></i>
      ${p.n}<b>${(p.v/h.totalCost*100).toFixed(1)}%</b></div>
      <div style="font-size:11px;color:var(--muted);margin:-3px 0 6px 19px">฿${fmt(p.v)}</div>`
      ).join('')+`</div></div></div>`;

  const cats = Object.entries(h.byCategory).sort((a,b)=>b[1]-a[1]);
  const cmax = cats.length?cats[0][1]:1;
  const catHtml = `<div class="panel"><h3>ต้นทุนแยกตามหมวดงาน</h3>`+
    cats.map(([c,v])=>`<div class="catbar">
      <div class="cl"><span>${c}</span><b>฿${fmt(v)}</b></div>
      <div class="ct"><i style="width:${(v/cmax*100)}%;background:${CAT_COLORS[c]||'#94a3b8'}"></i></div>
    </div>`).join('')+`</div>`;

  /* timeline */
  const tlHtml = `<div class="panel"><h3>ต้นทุนสะสมตามวันที่เบิก</h3>
    ${lineChart(h.timeline)}</div>`;

  /* item table */
  const tableHtml = `<div class="panel"><h3>รายการวัสดุ/ค่าแรงทั้งหมด (${h.itemCount} รายการ)</h3>
    <div class="filters" style="margin-top:0">
      <select id="dCat"><option value="">ทุกหมวด</option>
        ${[...new Set(h.items.map(i=>i.category))].map(c=>`<option>${c}</option>`).join('')}
      </select>
      <input id="dSearch" placeholder="ค้นหารายการ...">
    </div>
    <div class="tablebox"><table id="itemTable">
      <thead><tr>
        <th data-k="date">วันที่</th>
        <th data-k="name">รายการ</th>
        <th data-k="category">หมวด</th>
        <th data-k="qty" class="num">จำนวน</th>
        <th data-k="total" class="num">ยอดรวม (บาท)</th>
      </tr></thead><tbody id="itemBody"></tbody>
    </table></div></div>`;

  document.getElementById('detailBody').innerHTML =
    head + kpis + profitPanel + phasePanel +
    `<div class="charts2">${donutHtml}${catHtml}</div>` +
    tlHtml + tableHtml;

  /* table behaviour */
  let sortK='date', sortAsc=true;
  function drawRows(){
    const fc=document.getElementById('dCat').value;
    const q=document.getElementById('dSearch').value.trim().toLowerCase();
    let rows=h.items.filter(it=>
      (!fc||it.category===fc) && (!q||it.name.toLowerCase().includes(q)));
    rows.sort((a,b)=>{
      let x=a[sortK],y=b[sortK];
      if(typeof x==='string'){x=x.toLowerCase();y=y.toLowerCase();}
      return (x<y?-1:x>y?1:0)*(sortAsc?1:-1);
    });
    document.getElementById('itemBody').innerHTML = rows.map(it=>`
      <tr class="${it.isLabor?'lab-row':''}">
        <td>${it.dateText}</td>
        <td>${it.name}</td>
        <td><span class="cat-pill" style="background:${CAT_COLORS[it.category]||'#94a3b8'}22;
            color:${CAT_COLORS[it.category]||'#64748b'}">${it.category}</span></td>
        <td class="num">${fmt2(it.qty)}</td>
        <td class="num">${it.total?fmt2(it.total):'<span style="color:#94a3b8">—</span>'}</td>
      </tr>`).join('') ||
      `<tr><td colspan="5" style="text-align:center;color:var(--muted)">ไม่พบรายการ</td></tr>`;
  }
  document.getElementById('dCat').onchange=drawRows;
  document.getElementById('dSearch').oninput=drawRows;
  document.querySelectorAll('#itemTable th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(sortK===k) sortAsc=!sortAsc; else {sortK=k;sortAsc=true;}
    drawRows();
  });
  drawRows();
}

document.getElementById('btnBack').onclick=()=>{
  document.getElementById('detailView').classList.add('hide');
  document.getElementById('masterView').classList.remove('hide');
};

/* ---------- init ---------- */
renderKPI();
renderTypes();
fillStatusFilter();
applyFilter();
</script>

<!-- SHEET_SYNC -->
<script>
/* ───────────────────────────────────────────────
   Google Sheet Sync — Phase 2 metadata layer
   ───────────────────────────────────────────────
   Strategy:
   - HTML has full PROJECT_DATA embedded (works without internet)
   - On load: fetch CSV from Sheet, parse, merge into HOUSES[].
     "Merge" only overrides metadata fields (status, prices, houseNo, ...)
     never the cost data computed from transactions.
   - localStorage cache for fast load between sessions
   - "Re-sync" button + last-sync time in header
*/
(function() {
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLktRnqTZBHTEqvjo3UoYu3UtjMm9_UfReDsB7sg68Vm-1GGN6O65m7RCDXIGf7A/pub?gid=1161906404&single=true&output=csv"; // injected by build script
  const INSTALLMENTS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLktRnqTZBHTEqvjo3UoYu3UtjMm9_UfReDsB7sg68Vm-1GGN6O65m7RCDXIGf7A/pub?gid=680588198&single=true&output=csv";
  const SHEET_EDIT_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLktRnqTZBHTEqvjo3UoYu3UtjMm9_UfReDsB7sg68Vm-1GGN6O65m7RCDXIGf7A/pub";
  const CACHE_KEY = 'onevela_metadata_csv_v1';
  const CACHE_KEY_INST = 'onevela_installments_csv_v1';
  const CACHE_MIN = 5;

  /* Fields the Sheet is allowed to override (everything else stays from embedded data) */
  const META_FIELDS = new Set([
    // Property + pricing (Phase 2)
    'deed','houseNo','area','areaAdd',
    'priceStart','priceDiff','priceNet','apprSCB',
    'status','note',
    // Customer info (Phase 3 PII)
    'cName','cPhone','cLine','cEmail','cAddress','cJob','cCompany',
    'cIncome','cSpouse','cBirthday',
    // Sales funnel
    'agent','leadSource','dateBook','dateContract','dateDownEnd','dateTransfer',
    'bookAmount','loanBank','loanStatus','loanAmount',
    // Activity
    'followNote','lastContact',
    // Promotions
    'promos','promoValue',
    // Media
    'mapsUrl','virtualTour',
  ]);

  /* ─── Minimal correct CSV parser ─── */
  function parseCSV(text) {
    // Strip BOM
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const rows = [];
    let row = [], field = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; } // escaped quote
          else { inQ = false; }
        } else field += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else if (c === '\r') { /* skip */ }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function coerce(value, key) {
    if (value === '' || value == null) return null;
    const numericFields = ['plot','area','areaAdd','priceStart','priceDiff','priceNet','apprSCB',
                           'cIncome','bookAmount','loanAmount','promoValue',
                           'dueAmount','paidAmount'];
    if (numericFields.includes(key)) {
      const n = parseFloat(value);
      return isNaN(n) ? null : n;
    }
    return String(value).trim();
  }

  function rowsToObjects(rows) {
    if (rows.length < 3) return [];
    const headers = rows[0]; // English keys
    // rows[1] = Thai labels (skip)
    const out = [];
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      if (!r || !r[0]) continue; // skip empty
      const obj = {};
      headers.forEach((h, idx) => {
        obj[h] = coerce(r[idx], h);
      });
      out.push(obj);
    }
    return out;
  }

  /* ─── Fetch with cache ─── */
  function readCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const ageMin = (Date.now() - parsed.ts) / 60000;
      if (ageMin > CACHE_MIN * 6) return null; // discard if > 30 min
      return parsed;
    } catch (e) { return null; }
  }
  function writeCache(text) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), text }));
    } catch (e) {}
  }

  async function fetchSheet(baseUrl) {
    const url = baseUrl + (baseUrl.includes('?') ? '&' : '?') + 'cb=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  }

  /* ─── Merge Sheet data into HOUSES ─── */
  function mergeMetadata(houses, sheetRows) {
    const byPlot = new Map();
    for (const r of sheetRows) {
      if (r.plot != null) byPlot.set(Number(r.plot), r);
    }
    let changed = 0;
    for (const h of houses) {
      const m = byPlot.get(h.plot);
      if (!m) continue;
      for (const field of META_FIELDS) {
        if (m[field] !== undefined && m[field] !== h[field]) {
          h[field] = m[field];
          changed++;
        }
      }
    }
    return changed;
  }

  /* ─── Merge installments data ─── */
  function mergeInstallments(houses, instRows) {
    // Group by plot
    const byPlot = new Map();
    for (const r of instRows) {
      if (r.plot == null) continue;
      const p = Number(r.plot);
      if (!byPlot.has(p)) byPlot.set(p, []);
      byPlot.get(p).push(r);
    }
    let total = 0;
    for (const h of houses) {
      const arr = byPlot.get(h.plot) || [];
      // Sort: type order (จอง→สัญญา→ดาวน์→กู้→โอน), then due date
      const typeOrder = {'จอง':1,'สัญญา':2,'ดาวน์':3,'กู้':4,'โอน':5,'อื่นๆ':6};
      arr.sort((a,b) => {
        const ta = typeOrder[a.type] || 7;
        const tb = typeOrder[b.type] || 7;
        if (ta !== tb) return ta - tb;
        return (a.dueDate || '').localeCompare(b.dueDate || '');
      });
      // Auto-compute status: เลยกำหนด if dueDate < today and status === 'รอจ่าย'
      const today = new Date().toISOString().slice(0, 10);
      for (const inst of arr) {
        if (inst.status === 'รอจ่าย' && inst.dueDate && inst.dueDate < today) {
          inst._autoOverdue = true;
        }
      }
      h.installments = arr;
      total += arr.length;
    }
    return total;
  }

  /* ─── UI: status badge in header ─── */
  function injectStatusUI() {
    const gen = document.getElementById('hdGen');
    if (!gen) return null;
    const wrap = document.createElement('span');
    wrap.id = 'syncStatus';
    wrap.style.cssText = 'display:block;font-size:11px;margin-top:4px;color:#8fb0cf;';
    wrap.innerHTML = '<span id="syncDot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#94a3b8;margin-right:4px;vertical-align:middle;"></span>' +
      '<span id="syncText">กำลังเชื่อมต่อ Google Sheet...</span> · ' +
      '<a href="#" id="syncReload" style="color:#aac4dd;text-decoration:underline;">รีเฟรช</a>';
    gen.appendChild(wrap);
    document.getElementById('syncReload').addEventListener('click', (e) => {
      e.preventDefault();
      doSync(true);
    });
    return { dot: document.getElementById('syncDot'), text: document.getElementById('syncText') };
  }

  function setStatus(ui, color, text) {
    if (!ui) return;
    ui.dot.style.background = color;
    ui.text.textContent = text;
  }

  function rerender() {
    if (typeof renderKPI === 'function') renderKPI();
    if (typeof renderTypes === 'function') renderTypes();
    if (typeof applyFilter === 'function') applyFilter();
  }

  async function doSync(force = false) {
    const ui = window.__syncUI || (window.__syncUI = injectStatusUI());

    // Try cache first (unless force)
    if (!force) {
      const cached = readCache();
      if (cached) {
        try {
          const rows = parseCSV(cached.text);
          const objs = rowsToObjects(rows);
          if (objs.length) {
            const changes = mergeMetadata(window.HOUSES || [], objs);
            if (changes > 0) rerender();
            const ageMin = Math.round((Date.now() - cached.ts) / 60000);
            setStatus(ui, '#10b981', `ใช้แคช (${ageMin} นาทีก่อน) — ${objs.length} แปลง`);
          }
        } catch (e) {}
      }
    }

    // Always do live fetch in background — both metadata and installments in parallel
    setStatus(ui, '#f59e0b', 'กำลังเชื่อมต่อ Google Sheet...');
    try {
      const fetches = [fetchSheet(SHEET_CSV_URL).then(text => ({type:'meta', text}))];
      if (INSTALLMENTS_CSV_URL && INSTALLMENTS_CSV_URL.startsWith('http')) {
        fetches.push(fetchSheet(INSTALLMENTS_CSV_URL).then(text => ({type:'inst', text})));
      }
      const results = await Promise.allSettled(fetches);
      let changes = 0;
      let instCount = 0;
      let metaCount = 0;
      for (const r of results) {
        if (r.status !== 'fulfilled') continue;
        const {type, text} = r.value;
        const rows = parseCSV(text);
        const objs = rowsToObjects(rows);
        if (type === 'meta') {
          writeCache(text);
          changes += mergeMetadata(window.HOUSES || [], objs);
          metaCount = objs.length;
        } else if (type === 'inst') {
          localStorage.setItem(CACHE_KEY_INST, JSON.stringify({ts:Date.now(), text}));
          instCount = mergeInstallments(window.HOUSES || [], objs);
        }
      }
      rerender();
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const instTxt = instCount ? ` · ${instCount} งวด` : '';
      setStatus(ui, '#10b981', `ซิงค์ ${hh}:${mm} — ${metaCount} แปลง${instTxt} (${changes} เปลี่ยน)`);
    } catch (e) {
      console.warn('Sheet sync failed:', e);
      setStatus(ui, '#ef4444', 'เชื่อมต่อ Sheet ไม่ได้ — ใช้ข้อมูลล่าสุดที่บันทึกไว้');
    }
  }

  /* Expose HOUSES to window for the sync layer */
  window.addEventListener('load', () => {
    if (typeof HOUSES !== 'undefined') window.HOUSES = HOUSES;
    setTimeout(() => doSync(false), 100);
    // Auto-refresh every 5 minutes while page is open
    setInterval(() => doSync(false), CACHE_MIN * 60 * 1000);
  });
})();

</script>
